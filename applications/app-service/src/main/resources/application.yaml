server:
  port: 8081
spring:
  application:
    name: "ms-loan-applications"
  devtools:
    add-properties: false
  profiles:
    include: null
  r2dbc:
    url: r2dbc:postgresql://${R2DBC_HOST}:${R2DBC_PORT}/${R2DBC_DATABASE}
    username: ${R2DBC_USERNAME}
    password: ${R2DBC_PASSWORD}
    properties:
      schema: ${R2DBC_SCHEMA}
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
      
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
adapters:
  r2dbc:
    host: "${R2DBC_HOST}"
    port: "${R2DBC_PORT}"
    database: "${R2DBC_DATABASE}"
    schema: "${R2DBC_SCHEMA}"
    username: "${R2DBC_USERNAME}"
    password: "${R2DBC_PASSWORD}"
  restclient:
    timeout: "${REST_AUTH_TIMEOUT}"
    url:  "${REST_AUTH_URL}"
resilience4j:
  circuitbreaker:
    instances:
      testGet:
        registerHealthIndicator: true
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: "2s"
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowSize: 10
        minimumNumberOfCalls: 10
        waitDurationInOpenState: "10s"
      testPost:
        registerHealthIndicator: true
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: "2s"
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowSize: 10
        minimumNumberOfCalls: 10
        waitDurationInOpenState: "10s"
        
routes:
  paths:
    loanApp: "/api/v1/solicitud"

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    url: /openapi.yaml
    path: /doc/swagger-ui.html
  paths-to-match: /api/**

app:
  openapi:
    title: "CREDIYA: ms-loan-applications"
    description: "Api para la gestion de solicitudes de préstamo de la plataforma CrediYa"
    version: 1.0.0
    server: http://localhost:8081


jwt:
  secret: "${JWT_SECRET}"
  issuer: "${JWT_ISSUER}"